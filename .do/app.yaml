# DigitalOcean App Platform — ajuste name, repo y dominio antes de desplegar.
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
# El token API va solo en .env.deploy (nunca en este archivo).

name: terrafirma
region: nyc

domains:
  - domain: terrafirmaperu.com
    type: PRIMARY
  - domain: www.terrafirmaperu.com
    type: ALIAS

services:
  - name: web
    github:
      repo: terrafirmaperu/Terrafirma
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.production
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DJANGO_ALLOWED_HOSTS
        value: terrafirmaperu.com,www.terrafirmaperu.com,.ondigitalocean.app
      - key: DJANGO_PUBLIC_HOST
        value: terrafirmaperu.com
      # En producción use Managed PostgreSQL (ver deploy/digitalocean/DEPLOY.md).
      # La URL completa va como SECRET en App Platform, no en git.
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: POSTGRES_SSLMODE
        value: require
      - key: EMAIL_HOST_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: DNI_API_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: NEO_ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
      # Al arrancar el contenedor: migrate + módulos (incl. Config. API DNI en Seguridad).
      - key: RUN_MIGRATE
        value: "1"
      - key: RUN_BOOTSTRAP
        value: "1"
      # Solo primera vez con base vacía (opcional; bootstrap también detecta módulos faltantes):
      # - key: RUN_INITIAL_SEED
      #   value: "1"
    routes:
      - path: /

# Base dev embebida en App Platform puede fallar migrate (PG15 schema public).
# Preferir Managed Database + DATABASE_URL como SECRET (ver DEPLOY.md).
# SECRET obligatorios en el panel: DJANGO_SECRET_KEY, DATABASE_URL, DNI_API_TOKEN, NEO_ADMIN_PASSWORD.
