# DigitalOcean App Platform — ajuste name, repo y dominio antes de desplegar.
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
# El token API va solo en .env.deploy (nunca en este archivo).

name: terrafirma
region: nyc

services:
  - name: web
    github:
      repo: terrafirmaperu/Terrafirma
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.production
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DJANGO_ALLOWED_HOSTS
        value: terrafirmaperu.com,www.terrafirmaperu.com
      - key: DJANGO_PUBLIC_HOST
        value: terrafirmaperu.com
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: POSTGRES_SSLMODE
        value: require
      - key: EMAIL_HOST_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: DNI_API_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: NEO_ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
    routes:
      - path: /

databases:
  - name: db
    engine: PG
    version: "15"
    production: false

# Tras el primer deploy, en la consola de la app:
#   python manage.py migrate --noinput
#   python manage.py bootstrap_production
