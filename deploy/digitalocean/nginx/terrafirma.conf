upstream terrafirma_app {
    server unix:/run/terrafirma/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    server_name terrafirmaperu.com www.terrafirmaperu.com;

    client_max_body_size 25M;

    access_log /var/log/nginx/terrafirma-access.log;
    error_log /var/log/nginx/terrafirma-error.log;

    location /media/ {
        alias /var/www/terrafirma/app/media/;
    }

    location /static/ {
        alias /var/www/terrafirma/app/staticfiles/;
    }

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_pass http://terrafirma_app;
    }
}

# Tras certbot: descomente el bloque redirect y el server ssl generado por certbot.
