<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Vista previa de contrata</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 18px; background: #fff; color: #111; }
        body.contract-embed { padding: 12px 14px 16px; }
        .header { border-bottom: 1px solid #ddd; padding-bottom: 8px; margin-bottom: 10px; }
        .header h4 { margin: 0; font-size: 16px; }
        .header small { color: #666; }
        .content { white-space: pre-wrap; line-height: 1.45; font-size: 12px; }
        body.contract-embed .content { font-size: 11px; line-height: 1.4; }
    </style>
</head>
<body class="{% if embed %}contract-embed{% endif %}">
{% if not embed %}
<div class="header">
    <h4>Vista previa de contrata</h4>
    <small>Venta N° {{ sale.nro }} - Cliente: {{ sale.client.user.get_full_name }}</small>
</div>
{% endif %}
<div class="content">{{ preview_text }}</div>
</body>
</html>
