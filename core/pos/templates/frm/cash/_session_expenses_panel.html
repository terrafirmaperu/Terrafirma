<div class="card card-outline card-danger mb-3 cash-session-expenses-panel" id="cashSessionExpensesPanel">
    <div class="card-header p-2">
        <h5 class="card-title mb-0">
            <a class="d-flex align-items-center text-dark collapsed" data-toggle="collapse"
               href="#cashSessionExpensesCollapse" role="button" aria-expanded="false"
               aria-controls="cashSessionExpensesCollapse" id="cashSessionExpensesToggle">
                <i class="fas fa-chevron-right mr-2 cash-session-expenses-chevron"></i>
                <span>Lista de gastos del turno</span>
                <span class="badge badge-danger ml-2" id="cashSessionExpensesBadge">0</span>
            </a>
        </h5>
        <div class="card-tools">
            <a href="{{ expenses_list_url }}" class="btn btn-sm btn-danger btn-flat" title="Ir al módulo de gastos">
                <i class="fas fa-receipt"></i> Módulo de gastos
            </a>
        </div>
    </div>
    <div id="cashSessionExpensesCollapse" class="collapse">
        <div class="card-body p-2">
            <p class="text-muted small mb-2" id="cashSessionExpensesHint">
                Gastos registrados en esta sesión de caja. Se descuentan del efectivo en caja.
            </p>
            <div class="table-responsive">
                <table class="table table-sm table-bordered table-striped mb-0" id="cashSessionExpensesTable">
                    <thead class="thead-light">
                    <tr>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th>Descripción</th>
                        <th class="text-right">Monto</th>
                        <th class="text-center">Gasto</th>
                    </tr>
                    </thead>
                    <tbody id="cashSessionExpensesBody">
                    <tr class="cash-session-expenses-empty">
                        <td colspan="5" class="text-center text-muted">Sin gastos en esta sesión</td>
                    </tr>
                    </tbody>
                    <tfoot>
                    <tr>
                        <th colspan="3" class="text-right">Total gastado (descuenta caja)</th>
                        <th class="text-right" id="cashSessionExpensesTotal">S/ 0.00</th>
                        <th></th>
                    </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
</div>
