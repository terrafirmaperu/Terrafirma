{% load static %}
<div class="login-box">
    <div class="login-box-body">
        <div class="card">
            <div class="card-body login-card-body">

                <div class="contact-image text-center factora-login-brand">
                    {% include 'login/partials/factora_brand_logo.html' %}
                </div>
                <p class="login-box-msg">Inicio de Sesión</p>
                <form method="post" id="frmLogin" action="{% url 'login' %}">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">
                    <div class="form-group">
                        <label>Username:</label>
                        {{ form.username }}
                    </div>
                    <div class="form-group">
                        <label>Password:</label>
                        <div class="input-group my-group">
                            {{ form.password }}
                            <div class="input-group-append">
                                <button class="btn btnShowPassword btn-flat factora-login-gold" type="button">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-lg-12">
                            <button type="submit" class="btn btn-block btn-flat factora-login-gold">
                                <i class="fas fa-sign-in-alt"></i> Ingresar
                            </button>
                        </div>
                    </div>
                </form>
                <p class="mt-3 text-center desc">
                    Si has olvidado tu contraseña <a href="{% url 'reset_password' %}">da click aqui <i
                        class="fas fa-key"></i></a>
                </p>
                <p class="mt-2 text-center desc">
                    <a href="{% url 'home' %}">← Volver a la portada</a>
                </p>
            </div>
        </div>
    </div>
</div>
